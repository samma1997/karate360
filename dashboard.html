<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest-admin.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Fondamenti del Karate — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script src="config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #000000;
      --s1:          #0D0D0D;
      --s2:          #151515;
      --s3:          #1E1E1E;
      --s4:          #252525;
      --border:      rgba(255,255,255,0.06);
      --border-md:   rgba(255,255,255,0.10);
      --border-hi:   rgba(255,255,255,0.14);
      --amber:       #D4A574;
      --amber-dim:   rgba(212,165,116,0.10);
      --amber-glow:  rgba(212,165,116,0.06);
      --amber-border:rgba(212,165,116,0.18);
      --green:       #4CAF6E;
      --green-dim:   rgba(76,175,110,0.10);
      --green-border:rgba(76,175,110,0.18);
      --yellow:      #D4A843;
      --yellow-dim:  rgba(212,168,67,0.10);
      --red:         #E05252;
      --red-dim:     rgba(224,82,82,0.10);
      --red-border:  rgba(224,82,82,0.16);
      --white:       #FFFFFF;
      --t1:          #EBEBEB;
      --t2:          #8A8A8A;
      --t3:          #4A4A4A;
      --t4:          #2E2E2E;
      --r-xs:        6px;
      --r-sm:        8px;
      --r:           12px;
      --r-lg:        16px;
      --r-xl:        20px;
    }

    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ─── KEYFRAMES ─── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ─── LOADING ─── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.25s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--border-md);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    #loading-screen p {
      font-size: 12px;
      color: var(--t3);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* ─── TOAST ─── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--s3);
      border: 1px solid var(--border-md);
      backdrop-filter: blur(24px);
      color: var(--t1);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 99px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      z-index: 9998;
      transition: opacity 0.18s, transform 0.18s;
      max-width: calc(100vw - 40px);
      text-align: center;
      letter-spacing: -0.1px;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── NOTIF BANNER ─── */
    #notif-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      background: var(--amber-glow);
      border-bottom: 1px solid var(--amber-border);
      font-size: 13px;
      color: var(--amber);
    }
    #notif-banner i { font-size: 13px; flex-shrink: 0; }
    #notif-banner-text { flex: 1; line-height: 1.4; }
    #notif-enable-btn {
      background: var(--amber);
      color: #000;
      border: none;
      border-radius: var(--r-xs);
      padding: 5px 11px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.1px;
    }
    #notif-close {
      background: none;
      border: none;
      color: var(--t3);
      font-size: 15px;
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
      opacity: 0.7;
    }

    /* ─── HEADER ─── */
    #header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #header-icon {
      width: 30px;
      height: 30px;
      border-radius: var(--r-sm);
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--amber);
      flex-shrink: 0;
    }
    #header-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--white);
    }
    #header-sub {
      font-size: 11px;
      color: var(--t3);
      margin-top: 1px;
      letter-spacing: 0.1px;
    }
    #header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hbtn {
      height: 30px;
      min-width: 30px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border-md);
      background: var(--s2);
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      padding: 0 10px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      letter-spacing: -0.1px;
    }
    .hbtn:active { background: var(--s3); color: var(--amber); border-color: var(--amber-border); }
    .hbtn i { font-size: 11px; }
    #refresh-btn { padding: 0 10px; }

    /* ─── MAIN WRAPPER ─── */
    #main {
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 64px;
      animation: fadeUp 0.3s ease;
    }

    /* ─── SECTION LABEL ─── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--t3);
      padding: 32px 20px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── OVERVIEW BLOCK ─── */
    #overview-block {
      padding: 32px 20px 0;
    }
    #counter-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    #big-number {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -3px;
      color: var(--amber);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    #big-label {
      font-size: 18px;
      font-weight: 500;
      color: var(--t2);
      letter-spacing: -0.3px;
    }
    #overview-sub {
      font-size: 12px;
      color: var(--t3);
      margin-bottom: 24px;
      letter-spacing: -0.1px;
    }

    /* ─── TOP SLOTS ─── */
    #top-slots {
      display: flex;
      flex-direction: column;
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--s1);
    }
    .ts-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .ts-row:last-child { border-bottom: none; }
    .ts-rank {
      font-size: 11px;
      font-weight: 700;
      color: var(--t4);
      width: 14px;
      text-align: center;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .ts-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ts-dot.green  { background: var(--green);  box-shadow: 0 0 6px rgba(76,175,110,0.5); }
    .ts-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(212,168,67,0.5); }
    .ts-dot.gray   { background: var(--t4); }
    .ts-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--t1);
      letter-spacing: -0.1px;
    }
    .ts-bar-track {
      width: 56px;
      height: 2px;
      background: var(--border-md);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .ts-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .ts-bar-fill.green  { background: var(--green); }
    .ts-bar-fill.yellow { background: var(--yellow); }
    .ts-bar-fill.gray   { background: var(--t3); }
    .ts-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--t2);
      font-variant-numeric: tabular-nums;
      min-width: 20px;
      text-align: right;
    }

    /* ─── DIVIDER ─── */
    .divider { height: 1px; background: var(--border); margin: 0 20px; }

    /* ─── PROSSIMA LEZIONE CARD ─── */
    #next-card {
      margin: 0 20px;
      background: var(--s1);
      border: 1px solid var(--border-md);
      border-radius: var(--r-xl);
      overflow: hidden;
    }
    #next-card-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }
    #next-slot-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    #next-slot-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1.15;
    }
    #next-slot-sub {
      font-size: 13px;
      color: var(--t2);
      margin-top: 4px;
      letter-spacing: -0.1px;
    }
    #next-slot-badge {
      background: var(--amber-dim);
      color: var(--amber);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: var(--r-sm);
      border: 1px solid var(--amber-border);
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.2px;
    }

    /* confirmed bar */
    #confirmed-bar {
      display: none;
      margin: 0 20px;
      padding: 10px 14px;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      border-radius: var(--r-sm);
      font-size: 13px;
      color: var(--green);
      font-weight: 500;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.1px;
    }
    #confirmed-bar i { font-size: 12px; }

    /* people list */
    #next-people-list {
      padding: 0 20px 4px;
    }
    .person-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .person-row:last-child { border-bottom: none; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--s3);
      border: 1px solid var(--border-md);
      color: var(--amber);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .person-info { flex: 1; min-width: 0; }
    .person-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }
    .person-phone {
      font-size: 12px;
      color: var(--amber);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
      opacity: 0.75;
      letter-spacing: -0.1px;
    }
    .person-phone:active { opacity: 0.4; }
    .confirmed-tag {
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      letter-spacing: -0.1px;
    }

    /* next lesson actions */
    #next-lesson-actions {
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--border);
    }

    /* ─── BUTTONS ─── */
    .btn-primary {
      width: 100%;
      height: 52px;
      border-radius: var(--r);
      border: none;
      background: var(--amber);
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s, box-shadow 0.1s;
      box-shadow: 0 0 0 0 rgba(212,165,116,0);
    }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(212,165,116,0.22); }
    .btn-primary:active { transform: scale(0.985); opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
    .btn-primary i { font-size: 16px; }

    .btn-secondary {
      width: 100%;
      height: 42px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border-md);
      background: var(--s2);
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, color 0.1s;
      letter-spacing: -0.1px;
    }
    .btn-secondary:active { background: var(--s3); color: var(--t1); }

    .btn-ghost {
      background: none;
      border: none;
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.1px;
    }
    .btn-ghost:active { opacity: 0.45; }

    /* ─── ALL SLOTS ─── */
    #all-slots-list {
      margin: 0 20px;
      display: flex;
      flex-direction: column;
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--s1);
    }
    .slot-group {
      border-bottom: 1px solid var(--border);
    }
    .slot-group:last-child { border-bottom: none; }
    .slot-group-day {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--t3);
      padding: 10px 16px 8px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .slot-row {
      overflow: hidden;
      background: var(--s1);
    }
    .slot-row + .slot-row {
      border-top: 1px solid var(--border);
    }
    .slot-row-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s;
    }
    .slot-row-header:active { background: var(--s2); }
    .slot-row-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .slot-row-dot.green  { background: var(--green);  box-shadow: 0 0 5px rgba(76,175,110,0.4); }
    .slot-row-dot.yellow { background: var(--yellow); box-shadow: 0 0 5px rgba(212,168,67,0.4); }
    .slot-row-dot.gray   { background: var(--t4); }
    .slot-row-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--t1);
      letter-spacing: -0.1px;
    }
    .slot-count-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--t3);
      background: var(--s3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 99px;
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: center;
    }
    .slot-chevron {
      color: var(--t4);
      font-size: 10px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .slot-row.open .slot-chevron { transform: rotate(180deg); }
    .slot-row-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 8px 16px 14px;
      background: var(--s2);
    }
    .slot-row.open .slot-row-body { display: block; }
    .slot-person-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .slot-person-item:last-of-type { border-bottom: none; }
    .slot-person-name {
      flex: 1;
      color: var(--t1);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.1px;
    }
    .slot-wa-link {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(37,211,102,0.08);
      border: 1px solid rgba(37,211,102,0.15);
      color: #25D366;
      font-size: 13px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .slot-wa-link:active { background: rgba(37,211,102,0.18); }
    .slot-send-btn {
      width: 100%;
      margin-top: 12px;
      height: 38px;
      background: var(--s3);
      color: var(--t2);
      border: 1px solid var(--border-md);
      border-radius: var(--r-sm);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, color 0.1s;
      letter-spacing: -0.1px;
    }
    .slot-send-btn:active { background: var(--amber-dim); color: var(--amber); border-color: var(--amber-border); }

    /* ─── ALL PEOPLE ─── */
    #all-people-list {
      margin: 0 20px;
      display: flex;
      flex-direction: column;
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--s1);
    }
    .person-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .person-card:last-child { border-bottom: none; }
    .person-card-info { flex: 1; min-width: 0; }
    .person-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }
    .person-card-phone {
      font-size: 12px;
      color: var(--amber);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;

    .person-card-slots {

    /* ─── INVITE BLOCK ─── */
    #invite-block {
      margin: 0 20px;
      background: var(--s1);
      border: 1px solid var(--border);

    #invite-preview {

      flex: 1;

      color: var(--t3);
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--s3);
      border: 1px solid var(--border);
      border-radius: var(--r-xs);
      padding: 6px 10px;

      padding: 12px 18px;

    }
    .btn-invite {
      flex: 1;
      height: 38px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border-md);
      background: var(--s2);
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;

    .btn-invite:active { background: var(--s3); }
    .btn-invite.wa { color: #25D366; border-color: rgba(37,211,102,0.18); }
    .btn-invite.wa:active { background: rgba(37,211,102,0.07); }

    /* ─── FOOTER ─── */
    #footer-bar {
      text-align: center;
      padding: 28px 20px 0;
    }

      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--t4);
      letter-spacing: -0.1px;
    }
    #footer-status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 3s ease-in-out infinite;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      padding: 32px 20px;
      text-align: center;
    }
    .empty-state i {
      font-size: 22px;
      color: var(--t4);
      display: block;
      margin-bottom: 10px;
    }
    .empty-state p {

      color: var(--t3);

    /* ─── RESPONSIVE ─── */
    @media (min-width: 480px) {
      #big-number { font-size: 64px; letter-spacing: -4px; }
      #next-slot-name { font-size: 26px; }
    }
  </style>

<body>

<!-- LOADING SCREEN -->

</div>

<!-- TOAST -->

<!-- MAIN -->
<div id="main">

  <div class="section-label" style="padding-top:36px;">Prossima lezione</div>

  <!-- ═══════════════════════════════════════

  <div id="next-card">
    <div id="next-card-header">
      <div>
        <div id="next-slot-label">

    </div>

    <div id="confirmed-bar">
      <i class="fa-solid fa-circle-check"></i>

    <div id="next-lesson-actions">

  <!-- ═══════════════════════════════════════
       SECTION 3 — TUTTI GLI ORARI
  ═══════════════════════════════════════ -->

  <div class="section-label">Tutti gli iscritti</div>

  <!-- ═══════════════════════════════════════
       SECTION 4 — TUTTI GLI ISCRITTI
  ═══════════════════════════════════════ -->

  <!-- ═══════════════════════════════════════
       SECTION 5 — TESTO INVITO
  ═══════════════════════════════════════ -->

      </button>

        Copia
      </button>

  <!-- FOOTER -->

  <div style="height:48px;"></div>

</div><!-- /main -->

<script>
// ─────────────────────────────────────────────────────────────
// SLOTS
// ─────────────────────────────────────────────────────────────
const SLOTS = [
  { day: 'Lunedì',    time: '18:00-19:00' },
  { day: 'Lunedì',    time: '19:00-20:00' },
  { day: 'Mercoledì', time: '18:00-19:00' },
  { day: 'Mercoledì', time: '19:00-20:00' },
  { day: 'Venerdì',   time: '18:00-19:00' },
  { day: 'Venerdì',   time: '19:00-20:00' },
  { day: 'Sabato',    time: '09:00-10:00' },
  { day: 'Sabato',    time: '10:00-11:00' },
  { day: 'Sabato',    time: '11:00-12:00' },
  { day: 'Domenica',  time: '09:00-10:00' },
  { day: 'Domenica',  time: '10:00-11:00' },
  { day: 'Domenica',  time: '11:00-12:00' },
];

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let _data           = { registrations: [], lessons: [] };
let _bestSlot       = null;
let _lastCount      = null;
let _notifDismissed = false;
let _openSlots      = new Set();

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;');
}

function waLink(phone, msg) {
  const p   = (phone || '').replace(/\D/g, '');
  const num = p.startsWith('39') ? p : (p.startsWith('0') ? '39' + p.slice(1) : '39' + p);
  return `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'adesso';
  if (m < 60) return `${m} min fa`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h fa`;
  return `${Math.floor(h / 24)}g fa`;
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
}

function slotKey(s)             { return `${s.day} ${s.time}`; }
function slotLabel(s)           { return `${s.day} ${s.time}`; }
function formatSlotForMsg(s)    { return `${s.day} alle ${s.time.split('-')[0]}`; }

function showToast(msg, dur = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

async function copyToClipboard(text, msg) {
  try {
    await navigator.clipboard.writeText(text);
    showToast(msg || 'Copiato!');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast(msg || 'Copiato!'); } catch {}
    document.body.removeChild(ta);
  }
}

function getRegistrationLink() {
  return window.location.href.replace(/dashboard\.html.*$/, 'index.html');
}

function getLessonConfirmLink(id) {
  return window.location.href.replace(/dashboard\.html.*$/, `conferma.html?id=${id}`);
}

// ─────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────
async function loadData(manual = false) {
  if (manual) {
    const icon = document.getElementById('refresh-icon');
    icon.style.animation = 'spin 0.7s linear infinite';
  }
  try {
    const res = await fetch(API_URL, {
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      cache: 'no-store'
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    _data = await res.json();
    if (!Array.isArray(_data.registrations)) _data.registrations = [];
    if (!Array.isArray(_data.lessons))       _data.lessons = [];
    render();
    checkNewRegistrations();
    const now = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('footer-status-text').textContent = `Aggiornato alle ${now}`;
    const n = _data.registrations.length;
    document.getElementById('overview-sub').textContent =
      `${n === 1 ? '1 persona iscritta' : `${n} persone iscritte`} · aggiornato ${now}`;
  } catch (err) {
    if (manual) showToast('Errore di rete');
    console.error(err);
  } finally {
    if (manual) {
      setTimeout(() => {
        document.getElementById('refresh-icon').style.animation = '';
      }, 600);
    }
    const ls = document.getElementById('loading-screen');
    ls.classList.add('hidden');
    setTimeout(() => ls.style.display = 'none', 260);
  }
}

async function putData() {
  await fetch(API_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(_data)
  });
}

function checkNewRegistrations() {
  const count = _data.registrations.length;
  if (_lastCount !== null && count > _lastCount) {
    const diff = count - _lastCount;
    const msg  = diff === 1 ? 'Nuova iscrizione!' : `${diff} nuove iscrizioni!`;
    showToast(msg, 3500);
    if (Notification.permission === 'granted') {
      try { new Notification('Fondamenti del Karate', { body: msg, icon: 'icon-192.png' }); } catch {}
    }
  }
  _lastCount = count;
}

// ─────────────────────────────────────────────────────────────
// LESSON MANAGEMENT
// ─────────────────────────────────────────────────────────────
async function createLesson(slot) {
  const key = slotKey(slot);
  let lesson = _data.lessons.find(l => l.slotKey === key);
  if (lesson) return lesson;
  lesson = {
    id: 'lesson_' + Date.now(),
    slotKey: key,
    slotDay: slot.day,
    slotTime: slot.time,
    createdAt: new Date().toISOString(),
    confirmedIds: []
  };
  _data.lessons.push(lesson);
  await putData();
  return lesson;
}

function getLessonForSlot(slot) {
  return _data.lessons.find(l => l.slotKey === slotKey(slot)) || null;
}

// ─────────────────────────────────────────────────────────────
// SLOT COUNTS
// ─────────────────────────────────────────────────────────────
function getSlotCounts() {
  const counts = {};
  SLOTS.forEach(s => { counts[slotKey(s)] = []; });
  _data.registrations.forEach(r => {
    if (Array.isArray(r.slots)) {
      r.slots.forEach(sk => {
        if (counts[sk] !== undefined) counts[sk].push(r);
      });
    }
  });
  return counts;
}

function getBestSlot(counts) {
  let best = null, bestCount = 0;
  SLOTS.forEach(s => {
    const c = (counts[slotKey(s)] || []).length;
    if (c > bestCount) { bestCount = c; best = s; }
  });
  return best;
}

function dotClass(n) {
  return n >= 5 ? 'green' : n >= 3 ? 'yellow' : 'gray';
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function render() {
  const counts = getSlotCounts();
  _bestSlot = getBestSlot(counts);

  renderBigCounter();
  renderTopSlots(counts);
  renderNextLesson(counts);
  renderAllSlots(counts);
  renderAllPeople();
  renderInviteText();
}

function renderBigCounter() {
  document.getElementById('big-number').textContent = _data.registrations.length;
}

function renderTopSlots(counts) {
  const sorted = SLOTS
    .map(s => ({ slot: s, people: counts[slotKey(s)] || [] }))
    .sort((a, b) => b.people.length - a.people.length)
    .slice(0, 3);

  const el = document.getElementById('top-slots');

  if (sorted.every(x => x.people.length === 0)) {
    el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><p>Nessuna iscrizione ancora</p></div>`;
    return;
  }

  const maxN = Math.max(...sorted.map(x => x.people.length), 1);

  el.innerHTML = sorted.map(({ slot, people }, i) => {
    const n   = people.length;
    const cls = dotClass(n);
    const pct = Math.round((n / maxN) * 100);
    return `
      <div class="ts-row">
        <span class="ts-rank">${i + 1}</span>
        <span class="ts-dot ${cls}"></span>
        <span class="ts-name">${esc(slotLabel(slot))}</span>
        <div class="ts-bar-track"><div class="ts-bar-fill ${cls}" style="width:${pct}%"></div></div>
        <span class="ts-count">${n}</span>
      </div>`;
  }).join('');
}

function renderNextLesson(counts) {
  const nameEl    = document.getElementById('next-slot-name');
  const subEl     = document.getElementById('next-slot-sub');
  const badgeEl   = document.getElementById('next-slot-badge');
  const listEl    = document.getElementById('next-people-list');
  const barEl     = document.getElementById('confirmed-bar');
  const barText   = document.getElementById('confirmed-bar-text');

  if (!_bestSlot) {
    nameEl.textContent  = 'Nessuno slot';
    subEl.textContent   = 'Aspetta le prime iscrizioni';
    badgeEl.textContent = '—';
    listEl.innerHTML    = `<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>Nessun iscritto</p></div>`;
    barEl.style.display = 'none';
    return;
  }

  const key    = slotKey(_bestSlot);
  const people = counts[key] || [];
  const lesson = getLessonForSlot(_bestSlot);

  nameEl.textContent  = slotLabel(_bestSlot);
  subEl.textContent   = `${people.length} ${people.length === 1 ? 'persona disponibile' : 'persone disponibili'}`;
  badgeEl.textContent = `${people.length}`;

  // Confirmed bar
  if (lesson && Array.isArray(lesson.confirmedIds) && lesson.confirmedIds.length > 0) {
    barEl.style.display  = 'flex';
    barText.textContent  = `${lesson.confirmedIds.length} su ${people.length} ${lesson.confirmedIds.length === 1 ? 'ha confermato' : 'hanno confermato'}`;
  } else {
    barEl.style.display = 'none';
  }

  if (people.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>Nessuno per questo orario</p></div>`;
    return;
  }

  listEl.innerHTML = people.map(p => {
    const confirmed = lesson && Array.isArray(lesson.confirmedIds) && lesson.confirmedIds.includes(p.id);
    return `
      <div class="person-row">
        <div class="avatar">${esc(initials(p.name))}</div>
        <div class="person-info">
          <div class="person-name">${esc(p.name)}</div>
          ${p.phone
            ? `<a class="person-phone" href="${esc(waLink(p.phone, 'Ciao ' + p.name + '!'))}" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>${esc(p.phone)}
               </a>`
            : `<span class="person-phone" style="color:var(--t4);cursor:default;">Nessun numero</span>`
          }
        </div>
        ${confirmed
          ? `<span class="confirmed-tag"><i class="fa-solid fa-check"></i> confermato</span>`
          : ''
        }
      </div>`;
  }).join('');
}

function renderAllSlots(counts) {
  const container = document.getElementById('all-slots-list');

  // Group slots by day
  const byDay = {};
  SLOTS.forEach(s => {
    if (!byDay[s.day]) byDay[s.day] = [];
    byDay[s.day].push({ slot: s, people: counts[slotKey(s)] || [] });
  });

  const dayOrder = [...new Set(SLOTS.map(s => s.day))];

  let html = '';
  dayOrder.forEach(day => {
    const slots = byDay[day];
    html += `<div class="slot-group">
      <div class="slot-group-day">${esc(day)}</div>`;

    slots.forEach(({ slot, people }) => {
      const key    = slotKey(slot);
      const isOpen = _openSlots.has(key);
      const n      = people.length;
      const cls    = dotClass(n);

      html += `
        <div class="slot-row${isOpen ? ' open' : ''}" id="slot-row-${encodeURIComponent(key)}">
          <div class="slot-row-header" onclick="toggleSlot('${esc(key)}')">
            <span class="slot-row-dot ${cls}"></span>
            <span class="slot-row-name">${esc(slot.time)}</span>
            <span class="slot-count-badge">${n}</span>
            <i class="fa-solid fa-chevron-down slot-chevron"></i>
          </div>
          <div class="slot-row-body">
            ${n === 0
              ? `<div style="padding:6px 0 2px;font-size:13px;color:var(--t3);">Nessuno per questo orario</div>`
              : people.map(p => `
                  <div class="slot-person-item">
                    <div class="avatar" style="width:26px;height:26px;font-size:10px;">${esc(initials(p.name))}</div>
                    <span class="slot-person-name">${esc(p.name)}</span>
                    ${p.phone
                      ? `<a class="slot-wa-link" href="${esc(waLink(p.phone, 'Ciao ' + p.name + '!'))}" target="_blank">
                          <i class="fa-brands fa-whatsapp"></i>
                         </a>`
                      : ''
                    }
                  </div>`).join('')
            }
            <button class="slot-send-btn" onclick="sendSlotWhatsApp('${esc(key)}')">
              <i class="fa-brands fa-whatsapp"></i>
              Invia messaggio
            </button>
          </div>
        </div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

function toggleSlot(key) {
  if (_openSlots.has(key)) _openSlots.delete(key);
  else _openSlots.add(key);
  const el = document.getElementById('slot-row-' + encodeURIComponent(key));
  if (el) el.classList.toggle('open');
}

function renderAllPeople() {
  const container = document.getElementById('all-people-list');
  const people    = [..._data.registrations].sort((a, b) =>
    (a.name || '').localeCompare(b.name || '', 'it')
  );

  if (people.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-user-slash"></i><p>Nessun iscritto</p></div>`;
    return;
  }

  container.innerHTML = people.map(p => {
    const slotsText = Array.isArray(p.slots) && p.slots.length > 0
      ? p.slots.join(' · ')
      : 'Nessun orario';
    const metaText = p.createdAt ? timeAgo(p.createdAt) : '';
    return `
      <div class="person-card">
        <div class="avatar">${esc(initials(p.name))}</div>
        <div class="person-card-info">
          <div class="person-card-name">${esc(p.name)}</div>
          ${p.phone
            ? `<a class="person-card-phone" href="${esc(waLink(p.phone, 'Ciao ' + p.name + '!'))}" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>${esc(p.phone)}
               </a>`
            : `<span style="font-size:12px;color:var(--t4);">Nessun numero</span>`
          }
          <div class="person-card-slots">${esc(slotsText)}</div>
          ${metaText ? `<div class="person-card-meta">Iscritto ${metaText}</div>` : ''}
        </div>
        <button class="delete-btn" onclick="deleteRegistration('${esc(p.id)}', '${esc(p.name)}')" title="Rimuovi">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>`;
  }).join('');
}

function renderInviteText() {
  const link  = getRegistrationLink();
  const text  = `Ciao! Ti va di partecipare alle lezioni di Fondamenti del Karate? Scegli quando sei disponibile: ${link} — Salvatore`;
  document.getElementById('invite-text-preview').textContent = `"${text}"`;
  document.getElementById('invite-link-display').textContent = link;
  document.getElementById('invite-block').dataset.inviteText = text;
}

// ─────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────
async function sendWhatsApp() {
  if (!_bestSlot) { showToast('Nessuno slot disponibile'); return; }

  const btn  = document.getElementById('wa-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Preparazione…';

  try {
    const lesson = await createLesson(_bestSlot);
    const counts = getSlotCounts();
    const people = counts[slotKey(_bestSlot)] || [];
    const link   = getLessonConfirmLink(lesson.id);
    const msg    = `Ciao a tutti! Lezione di Fondamenti del Karate ${formatSlotForMsg(_bestSlot)}. Siamo in ${people.length}! Conferma qui: ${link} — Salvatore`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    showToast('Messaggio pronto!');
    await loadData();
  } catch (e) {
    showToast('Errore. Riprova.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-brands fa-whatsapp"></i> INVIA SU WHATSAPP';
  }
}

async function copyLessonLink() {
  if (!_bestSlot) { showToast('Nessuno slot disponibile'); return; }
  const lesson = await createLesson(_bestSlot);
  copyToClipboard(getLessonConfirmLink(lesson.id), 'Link copiato!');
}

async function sendSlotWhatsApp(key) {
  const slot = SLOTS.find(s => slotKey(s) === key);
  if (!slot) return;
  const lesson = await createLesson(slot);
  const counts = getSlotCounts();
  const people = counts[key] || [];
  const link   = getLessonConfirmLink(lesson.id);
  const msg    = `Ciao a tutti! Lezione di Fondamenti del Karate ${formatSlotForMsg(slot)}. Siamo in ${people.length}! Conferma qui: ${link} — Salvatore`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  showToast('Messaggio pronto!');
  await loadData();
}

async function deleteRegistration(id, name) {
  if (!confirm(`Eliminare ${name}?`)) return;
  _data.registrations = _data.registrations.filter(r => r.id !== id);
  await putData();
  showToast(`${name} rimosso`);
  await loadData();
}

function copyInviteText() {
  copyToClipboard(document.getElementById('invite-block').dataset.inviteText, 'Testo copiato!');
}

function copyRegLink() {
  copyToClipboard(getRegistrationLink(), 'Link copiato!');
}

function sendInviteWhatsApp() {
  const text = document.getElementById('invite-block').dataset.inviteText;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

// ─────────────────────────────────────────────────────────────
// EXPORT CSV
// ─────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Nome', 'Telefono', 'Orari', 'Iscritto il']];
  _data.registrations.forEach(r => {
    rows.push([
      r.name || '',
      r.phone || '',
      Array.isArray(r.slots) ? r.slots.join(' | ') : '',
      r.createdAt ? new Date(r.createdAt).toLocaleString('it-IT') : ''
    ]);
  });
  const csv  = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `karate_iscritti_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV esportato!');
}

// ─────────────────────────────────────────────────────────────
// NOTIFICATIONS
// ─────────────────────────────────────────────────────────────
function showNotifBanner() {
  if (_notifDismissed) return;
  if (Notification.permission === 'granted') return;
  if (Notification.permission === 'denied')  return;
  if (localStorage.getItem('notif_dismissed')) return;
  document.getElementById('notif-banner').style.display = 'flex';
}

function dismissNotifBanner() {
  document.getElementById('notif-banner').style.display = 'none';
  _notifDismissed = true;
  localStorage.setItem('notif_dismissed', '1');
}

async function enableNotifications() {
  try {
    const perm = await Notification.requestPermission();
    dismissNotifBanner();
    showToast(perm === 'granted' ? 'Notifiche attivate!' : 'Notifiche non attivate');
  } catch { dismissNotifBanner(); }
}

// ─────────────────────────────────────────────────────────────
// SERVICE WORKER
// ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─────────────────────────────────────────────────────────────
// AUTO REFRESH — 30s full reload, 15s silent poll
// ─────────────────────────────────────────────────────────────
setInterval(() => loadData(false), 30000);

setInterval(() => {
  fetch(API_URL, {
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    cache: 'no-store'
  })
  .then(r => r.json())
  .then(d => {
    if (!Array.isArray(d.registrations)) return;
    const count = d.registrations.length;
    if (_lastCount !== null && count > _lastCount) {
      const diff = count - _lastCount;
      const msg  = diff === 1 ? 'Nuova iscrizione!' : `${diff} nuove iscrizioni!`;
      showToast(msg, 3500);
      if (Notification.permission === 'granted') {
        try { new Notification('Fondamenti del Karate', { body: msg, icon: 'icon-192.png' }); } catch {}
      }
      _data = d;
      if (!Array.isArray(_data.lessons)) _data.lessons = [];
      render();
    }
    _lastCount = count;
  })
  .catch(() => {});
}, 15000);

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadData(false);
  setTimeout(showNotifBanner, 3000);
});
</script>
