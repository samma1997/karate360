<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FFFFFF" />
  <link rel="manifest" href="manifest-admin.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Fondamenti del Karate — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script src="config.js"></script>

  <style>
    /* ─── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── CSS VARIABLES ──────────────────────────────── */
    :root {
      --bg:        #FFFFFF;
      --bg-2:      #F7F7F5;
      --bg-3:      #EDEDED;
      --text:      #37352F;
      --text-2:    #787774;
      --text-3:    #B4B4B0;
      --accent:    #2383E2;
      --accent-bg: rgba(35,131,226,0.08);
      --green:     #0F7B0F;
      --yellow:    #C29243;
      --red:       #E03E3E;
      --red-bg:    rgba(224,62,62,0.07);
      --border:    rgba(55,53,47,0.09);
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius:    8px;
      --radius-sm: 5px;
    }

    [data-theme="dark"] {
      --bg:        #191919;
      --bg-2:      #202020;
      --bg-3:      #2F2F2F;
      --text:      #E8E8E3;
      --text-2:    #9B9A97;
      --text-3:    #5A5A58;
      --accent:    #529CCA;
      --accent-bg: rgba(82,156,202,0.1);
      --green:     #4CAF6E;
      --yellow:    #D4A843;
      --red:       #E05252;
      --red-bg:    rgba(224,82,82,0.08);
      --border:    rgba(255,255,255,0.07);
      --shadow:    0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
    }

    /* ─── BASE ───────────────────────────────────────── */
    html { font-size: 15px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.25s ease, color 0.25s ease;
      min-height: 100vh;
    }

    /* ─── STICKY HEADER ──────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .icon-btn:hover {
      background: var(--bg-2);
      color: var(--text);
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .theme-btn:hover {
      background: var(--bg-2);
      color: var(--text);
    }

    /* ─── MAIN LAYOUT ────────────────────────────────── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    /* ─── SECTION ────────────────────────────────────── */
    .section {
      margin-bottom: 48px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    /* ─── OVERVIEW ───────────────────────────────────── */
    .overview-row {
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .big-count-block {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .big-count {
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.03em;
    }

    .big-count-label {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-2);
    }

    .divider-v {
      width: 1px;
      height: 52px;
      background: var(--border);
    }

    .top-slots {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .slot-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 6px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .slot-chip .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .slot-chip .chip-count {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 400;
    }

    .dot-1 { background: var(--accent); }
    .dot-2 { background: var(--green); }
    .dot-3 { background: var(--yellow); }

    /* ─── CARD ───────────────────────────────────────── */
    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: background 0.25s ease, border-color 0.25s ease;
      box-shadow: var(--shadow);
    }

    /* ─── PROSSIMA LEZIONE ───────────────────────────── */
    .lesson-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .lesson-slot-info .lesson-day {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 2px;
    }

    .lesson-slot-info .lesson-time {
      font-size: 14px;
      color: var(--text-2);
      font-weight: 400;
    }

    .slot-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slot-select {
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .slot-select:focus {
      border-color: var(--accent);
    }

    /* ─── PEOPLE LIST ────────────────────────────────── */
    .people-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .person-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.12s;
    }

    .person-row:hover {
      background: var(--bg-2);
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .person-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .person-meta {
      font-size: 12px;
      color: var(--text-3);
    }

    .wa-icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--green);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s;
      flex-shrink: 0;
      text-decoration: none;
    }

    .wa-icon-btn:hover {
      background: rgba(15,123,15,0.08);
    }

    [data-theme="dark"] .wa-icon-btn:hover {
      background: rgba(76,175,110,0.12);
    }

    /* ─── ACTION BUTTONS ─────────────────────────────── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 50px;
      padding: 0 20px;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 36px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-2);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-ghost:hover {
      background: var(--bg-2);
      color: var(--text);
    }

    .copy-link-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .link-preview {
      font-size: 12px;
      color: var(--text-3);
      font-family: 'Menlo', 'Monaco', monospace;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── TUTTI GLI ORARI ────────────────────────────── */
    .slots-table {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slot-row {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .slot-row-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      cursor: pointer;
      background: var(--bg);
      transition: background 0.12s;
      user-select: none;
    }

    .slot-row-header:hover {
      background: var(--bg-2);
    }

    .slot-row-header.open {
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }

    .slot-chevron {
      font-size: 11px;
      color: var(--text-3);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .slot-row-header.open .slot-chevron {
      transform: rotate(90deg);
    }

    .slot-day-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      min-width: 90px;
      flex-shrink: 0;
    }

    .slot-time-label {
      font-size: 13px;
      color: var(--text-2);
      flex: 1;
    }

    .slot-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--accent-bg);
      color: var(--accent);
      flex-shrink: 0;
    }

    .slot-badge.empty {
      background: var(--bg-3);
      color: var(--text-3);
    }

    .slot-row-body {
      display: none;
      padding: 10px 14px 14px;
      background: var(--bg-2);
    }

    .slot-row-body.open {
      display: block;
    }

    .slot-people-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slot-person-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      padding: 4px 6px;
      border-radius: 4px;
      transition: background 0.12s;
    }

    .slot-person-item:hover {
      background: var(--bg-3);
    }

    .slot-person-item .avatar {
      width: 24px;
      height: 24px;
      font-size: 9px;
    }

    /* ─── TUTTI GLI ISCRITTI ─────────────────────────── */
    .registrations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 8px;
    }

    .reg-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      transition: background 0.12s, border-color 0.15s;
    }

    .reg-card:hover {
      background: var(--bg-2);
    }

    .reg-card .avatar {
      width: 36px;
      height: 36px;
      font-size: 12px;
      flex-shrink: 0;
    }

    .reg-info {
      flex: 1;
      min-width: 0;
    }

    .reg-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reg-slot {
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reg-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .del-btn {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: background 0.15s, color 0.15s;
    }

    .del-btn:hover {
      background: var(--red-bg);
      color: var(--red);
    }

    /* ─── TESTO INVITO ───────────────────────────────── */
    .invite-block {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .invite-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-line;
    }

    /* ─── TOAST ──────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 8px;
      z-index: 9999;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      box-shadow: var(--shadow-md);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─── NOTIFICATION BANNER ────────────────────────── */
    #notif-banner {
      position: fixed;
      top: 60px;
      right: 20px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 16px;
      border-radius: 8px;
      z-index: 9999;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-md);
      animation: slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 300px;
    }

    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ─── EMPTY STATE ────────────────────────────────── */
    .empty-state {
      padding: 32px 0;
      text-align: center;
      color: var(--text-3);
      font-size: 13px;
    }

    /* ─── LOADING ────────────────────────────────────── */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-2);
      font-size: 13px;
      padding: 12px 0;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 600px) {
      .main { padding: 24px 16px 60px; }
      .header { padding: 0 16px; }
      .big-count { font-size: 42px; }
      .divider-v { display: none; }
      .registrations-grid { grid-template-columns: 1fr; }
    }

    /* ─── TRANSITIONS ────────────────────────────────── */
    .card, .slot-row, .reg-card, .invite-block,
    .slot-row-header, .slot-row-body {
      transition: background 0.25s ease, border-color 0.25s ease;
    }
  </style>
</head>

<body>

  <!-- ─── HEADER ─────────────────────────────────────── -->
  <header class="header">
    <div class="header-title">
      <span class="dot"></span>
      Fondamenti del Karate
    </div>
    <div class="header-actions">
      <button class="theme-btn" id="themeBtn" title="Cambia tema">
        <i class="fa-solid fa-sun" id="themeIcon"></i>
      </button>
      <button class="icon-btn" onclick="loadData()" title="Aggiorna dati">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
      <button class="icon-btn" onclick="exportCSV()" title="Esporta CSV">
        <i class="fa-solid fa-download"></i>
      </button>
    </div>
  </header>

  <!-- ─── NOTIFICATION BANNER ──────────────────────── -->
  <div id="notif-banner">
    <i class="fa-solid fa-bell"></i>
    <span id="notif-text">Nuova iscrizione!</span>
    <button onclick="document.getElementById('notif-banner').style.display='none'"
            style="background:none;border:none;color:#fff;cursor:pointer;margin-left:4px;font-size:14px;">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <!-- ─── MAIN ──────────────────────────────────────── -->
  <main class="main">

    <!-- ── Section 1: Overview ─────────────────────── -->
    <section class="section" id="sec-overview">
      <div class="section-label">Panoramica</div>
      <div class="overview-row">
        <div class="big-count-block">
          <span class="big-count" id="total-count">—</span>
          <span class="big-count-label">iscritti</span>
        </div>
        <div class="divider-v"></div>
        <div class="top-slots" id="top-slots">
          <span class="slot-chip" style="color:var(--text-2);font-size:13px;border-style:dashed;">
            Caricamento…
          </span>
        </div>
      </div>
    </section>

    <!-- ── Section 2: Prossima Lezione ─────────────── -->
    <section class="section" id="sec-lesson">
      <div class="section-label">Prossima Lezione</div>
      <div class="card">
        <div class="lesson-header">
          <div class="lesson-slot-info">
            <div class="lesson-day" id="lesson-day">—</div>
            <div class="lesson-time" id="lesson-time">Seleziona un orario</div>
          </div>
          <div class="slot-select-wrap">
            <select class="slot-select" id="slot-select" onchange="onSlotChange()">
            </select>
          </div>
        </div>

        <div class="people-list" id="lesson-people">
          <div class="loading-row">
            <div class="spinner"></div>
            <span>Caricamento partecipanti…</span>
          </div>
        </div>

        <div class="action-row">
          <button class="btn-primary" onclick="sendWhatsApp()">
            <i class="fa-brands fa-whatsapp"></i>
            INVIA SU WHATSAPP
          </button>
          <button class="btn-ghost" onclick="copyLessonLink()">
            <i class="fa-solid fa-link"></i>
            Copia link
          </button>
        </div>

        <div class="copy-link-row">
          <span class="link-preview" id="lesson-link-preview">—</span>
        </div>
      </div>
    </section>

    <!-- ── Section 3: Tutti gli Orari ──────────────── -->
    <section class="section" id="sec-slots">
      <div class="section-label">Tutti gli Orari</div>
      <div class="slots-table" id="slots-table">
        <div class="loading-row">
          <div class="spinner"></div>
          <span>Caricamento orari…</span>
        </div>
      </div>
    </section>

    <!-- ── Section 4: Tutti gli Iscritti ───────────── -->
    <section class="section" id="sec-registrations">
      <div class="section-label">Tutti gli Iscritti</div>
      <div class="registrations-grid" id="registrations-grid">
        <div class="loading-row">
          <div class="spinner"></div>
          <span>Caricamento iscritti…</span>
        </div>
      </div>
    </section>

    <!-- ── Section 5: Testo Invito ──────────────────── -->
    <section class="section" id="sec-invite">
      <div class="section-label">Testo Invito</div>
      <div class="invite-block">
        <div class="invite-text" id="invite-text"></div>
      </div>
      <div class="action-row">
        <button class="btn-ghost" onclick="copyInviteText()">
          <i class="fa-solid fa-copy"></i>
          Copia testo
        </button>
        <button class="btn-ghost" onclick="shareInviteWhatsApp()" style="color:var(--green);border-color:currentColor;">
          <i class="fa-brands fa-whatsapp"></i>
          WhatsApp
        </button>
      </div>
    </section>

  </main>

  <!-- ─── TOAST ─────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ─── SCRIPT ────────────────────────────────────── -->
  <script>
  /* ═══════════════════════════════════════════════════
     SLOTS
  ═══════════════════════════════════════════════════ */
  const SLOTS = [
    { day: 'Lunedì',    time: '18:00-19:00' },
    { day: 'Lunedì',    time: '19:00-20:00' },
    { day: 'Mercoledì', time: '18:00-19:00' },
    { day: 'Mercoledì', time: '19:00-20:00' },
    { day: 'Venerdì',   time: '18:00-19:00' },
    { day: 'Venerdì',   time: '19:00-20:00' },
    { day: 'Sabato',    time: '09:00-10:00' },
    { day: 'Sabato',    time: '10:00-11:00' },
    { day: 'Sabato',    time: '11:00-12:00' },
    { day: 'Domenica',  time: '09:00-10:00' },
    { day: 'Domenica',  time: '10:00-11:00' },
    { day: 'Domenica',  time: '11:00-12:00' },
  ];

  /* ═══════════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════════ */
  let _data = { registrations: [], lessons: [] };
  let _selectedSlotIdx = 0;
  let _prevCount = null;

  /* ═══════════════════════════════════════════════════
     HELPERS
  ═══════════════════════════════════════════════════ */
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - new Date(ts).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'adesso';
    if (m < 60) return `${m}m fa`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h fa`;
    return `${Math.floor(h/24)}g fa`;
  }

  function waLink(phone, msg) {
    const p = String(phone || '').replace(/\D/g, '');
    const ph = p.startsWith('39') ? p : '39' + p;
    return `https://wa.me/${ph}?text=${encodeURIComponent(msg)}`;
  }

  function getRegistrationLink() {
    return window.location.origin + window.location.pathname.replace('dashboard.html', 'index.html');
  }

  function getLessonConfirmLink(id) {
    return window.location.origin + window.location.pathname.replace('dashboard.html', '') + `conferma.html?id=${id}`;
  }

  function slotKey(s) {
    return `${s.day}-${s.time}`;
  }

  function getRegsForSlot(slotObj) {
    const key = slotKey(slotObj);
    return (_data.registrations || []).filter(r =>
      r.slot === key || r.slot === `${slotObj.day} ${slotObj.time}` ||
      (r.day === slotObj.day && r.time === slotObj.time)
    );
  }

  function getBestSlotIdx() {
    let best = 0, bestCount = -1;
    SLOTS.forEach((s, i) => {
      const c = getRegsForSlot(s).length;
      if (c > bestCount) { bestCount = c; best = i; }
    });
    return best;
  }

  /* ═══════════════════════════════════════════════════
     UI FEEDBACK
  ═══════════════════════════════════════════════════ */
  let _toastTimer = null;
  function showToast(msg, duration = 2400) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
  }

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('Copiato!'));
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copiato!');
    }
  }

  /* ═══════════════════════════════════════════════════
     API
  ═══════════════════════════════════════════════════ */
  async function loadData() {
    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      _data = await res.json();
      if (!_data.registrations) _data.registrations = [];
      if (!_data.lessons)       _data.lessons = [];
      render();
      checkNewRegistrations();
    } catch(e) {
      showToast('Errore caricamento dati');
      console.error(e);
    }
  }

  async function putData() {
    try {
      const res = await fetch(API_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(_data)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch(e) {
      showToast('Errore salvataggio dati');
      console.error(e);
    }
  }

  async function deleteRegistration(id, name) {
    if (!confirm(`Eliminare ${name}?`)) return;
    _data.registrations = (_data.registrations || []).filter(r => r.id !== id);
    await putData();
    showToast(`${name} eliminato`);
    render();
  }

  async function createLesson(slotObj) {
    const id = 'lesson_' + Date.now();
    const lesson = {
      id,
      day:       slotObj.day,
      time:      slotObj.time,
      slot:      slotKey(slotObj),
      createdAt: new Date().toISOString(),
      participants: getRegsForSlot(slotObj).map(r => r.id)
    };
    if (!_data.lessons) _data.lessons = [];
    _data.lessons.push(lesson);
    await putData();
    return id;
  }

  /* ═══════════════════════════════════════════════════
     RENDER
  ═══════════════════════════════════════════════════ */
  function render() {
    renderOverview();
    renderSlotSelect();
    renderLessonSection();
    renderSlotsTable();
    renderRegistrations();
    renderInviteText();
  }

  /* ── Overview ──────────────────────────────────── */
  function renderOverview() {
    const total = (_data.registrations || []).length;
    document.getElementById('total-count').textContent = total;

    // top 3 slots by count
    const counts = SLOTS.map((s, i) => ({ s, i, count: getRegsForSlot(s).length }));
    const sorted = [...counts].sort((a,b) => b.count - a.count).slice(0,3);

    const dotClasses = ['dot-1','dot-2','dot-3'];
    const topEl = document.getElementById('top-slots');
    topEl.innerHTML = sorted.map((item, rank) => {
      if (item.count === 0) return '';
      return `
        <div class="slot-chip">
          <span class="chip-dot ${dotClasses[rank]}"></span>
          <span>${esc(item.s.day)} ${esc(item.s.time)}</span>
          <span class="chip-count">${item.count}</span>
        </div>`;
    }).filter(Boolean).join('') || '<span style="font-size:13px;color:var(--text-3)">Nessuna iscrizione</span>';
  }

  /* ── Slot select ───────────────────────────────── */
  function renderSlotSelect() {
    const sel = document.getElementById('slot-select');
    const prev = sel.value;
    sel.innerHTML = SLOTS.map((s, i) => {
      const c = getRegsForSlot(s).length;
      return `<option value="${i}">${s.day} ${s.time} (${c})</option>`;
    }).join('');
    if (prev !== '') {
      sel.value = prev;
      _selectedSlotIdx = parseInt(prev, 10);
    } else {
      _selectedSlotIdx = getBestSlotIdx();
      sel.value = _selectedSlotIdx;
    }
  }

  /* ── Lesson section ────────────────────────────── */
  function renderLessonSection() {
    const slot = SLOTS[_selectedSlotIdx];
    document.getElementById('lesson-day').textContent = slot.day;
    document.getElementById('lesson-time').textContent = slot.time;

    const regs = getRegsForSlot(slot);
    const peopleEl = document.getElementById('lesson-people');

    if (regs.length === 0) {
      peopleEl.innerHTML = `<div class="empty-state">Nessun iscritto per questo orario</div>`;
    } else {
      peopleEl.innerHTML = regs.map(r => {
        const phone = r.phone || r.telefono || '';
        const msg = `Ciao ${esc(r.name || r.nome || '')}, ti ricordo la lezione di Karate ${slot.day} alle ${slot.time}!`;
        const wa = phone ? `<a class="wa-icon-btn" href="${waLink(phone, msg)}" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>` : '';
        return `
          <div class="person-row">
            <div class="avatar">${initials(r.name || r.nome || '?')}</div>
            <span class="person-name">${esc(r.name || r.nome || 'N/D')}</span>
            <span class="person-meta">${phone ? phone : ''}</span>
            ${wa}
          </div>`;
      }).join('');
    }

    // link preview
    const lastLesson = (_data.lessons || []).slice().reverse().find(l => l.slot === slotKey(slot));
    const previewLink = lastLesson ? getLessonConfirmLink(lastLesson.id) : '—';
    document.getElementById('lesson-link-preview').textContent = previewLink;
  }

  /* ── Slots table ───────────────────────────────── */
  function renderSlotsTable() {
    const container = document.getElementById('slots-table');
    container.innerHTML = SLOTS.map((s, i) => {
      const regs = getRegsForSlot(s);
      const count = regs.length;
      const badgeClass = count === 0 ? 'slot-badge empty' : 'slot-badge';

      const peopleHtml = count === 0
        ? '<span style="font-size:13px;color:var(--text-3)">Nessun iscritto</span>'
        : regs.map(r => {
            const phone = r.phone || r.telefono || '';
            const msg = `Ciao ${esc(r.name || r.nome || '')}, ti ricordo la lezione di Karate ${s.day} alle ${s.time}!`;
            const wa = phone ? `<a class="wa-icon-btn" href="${waLink(phone, msg)}" target="_blank" style="width:24px;height:24px;font-size:13px;" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>` : '';
            return `<div class="slot-person-item">
              <div class="avatar">${initials(r.name || r.nome || '?')}</div>
              <span style="flex:1">${esc(r.name || r.nome || 'N/D')}</span>
              <span style="font-size:12px;color:var(--text-3);margin-right:4px">${phone}</span>
              ${wa}
            </div>`;
          }).join('');

      return `
        <div class="slot-row" id="slot-row-${i}">
          <div class="slot-row-header" onclick="toggleSlotRow(${i})">
            <i class="fa-solid fa-chevron-right slot-chevron" id="chevron-${i}"></i>
            <span class="slot-day-label">${esc(s.day)}</span>
            <span class="slot-time-label">${esc(s.time)}</span>
            <span class="${badgeClass}">${count} iscritti</span>
          </div>
          <div class="slot-row-body" id="slot-body-${i}">
            <div class="slot-people-list">${peopleHtml}</div>
          </div>
        </div>`;
    }).join('');
  }

  function toggleSlotRow(i) {
    const header = document.querySelector(`#slot-row-${i} .slot-row-header`);
    const body   = document.getElementById(`slot-body-${i}`);
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    header.classList.toggle('open', !isOpen);
  }

  /* ── Registrations grid ────────────────────────── */
  function renderRegistrations() {
    const grid = document.getElementById('registrations-grid');
    const regs = _data.registrations || [];

    if (regs.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">Nessun iscritto</div>`;
      return;
    }

    const sorted = [...regs].sort((a,b) => {
      const na = (a.name || a.nome || '').toLowerCase();
      const nb = (b.name || b.nome || '').toLowerCase();
      return na.localeCompare(nb);
    });

    grid.innerHTML = sorted.map(r => {
      const name  = r.name || r.nome || 'N/D';
      const phone = r.phone || r.telefono || '';
      const slot  = r.slot || (r.day ? `${r.day} ${r.time}` : '—');
      const msg   = `Ciao ${name}!`;
      const wa    = phone ? `<a class="wa-icon-btn" href="${waLink(phone, msg)}" target="_blank" title="WhatsApp" style="color:var(--green)"><i class="fa-brands fa-whatsapp"></i></a>` : '';
      return `
        <div class="reg-card">
          <div class="avatar">${initials(name)}</div>
          <div class="reg-info">
            <div class="reg-name">${esc(name)}</div>
            <div class="reg-slot">${esc(slot)}</div>
          </div>
          <div class="reg-actions">
            ${wa}
            <button class="del-btn" onclick="deleteRegistration('${esc(r.id)}', '${esc(name)}')" title="Elimina">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        </div>`;
    }).join('');
  }

  /* ── Invite text ───────────────────────────────── */
  function renderInviteText() {
    const link = getRegistrationLink();
    const text = `Ciao! Ti invito a iscriverti alle lezioni di Fondamenti del Karate.

Clicca qui per scegliere il tuo orario preferito e registrarti:
${link}

Le lezioni si svolgono ogni settimana e sono aperte a tutti i livelli. Ti aspettiamo!`;
    document.getElementById('invite-text').textContent = text;
  }

  /* ═══════════════════════════════════════════════════
     SLOT SELECT CHANGE
  ═══════════════════════════════════════════════════ */
  function onSlotChange() {
    const sel = document.getElementById('slot-select');
    _selectedSlotIdx = parseInt(sel.value, 10);
    renderLessonSection();
  }

  /* ═══════════════════════════════════════════════════
     ACTIONS
  ═══════════════════════════════════════════════════ */
  async function sendWhatsApp() {
    const slot = SLOTS[_selectedSlotIdx];
    const regs = getRegsForSlot(slot);

    // create lesson record
    const lessonId = await createLesson(slot);
    const confirmLink = getLessonConfirmLink(lessonId);

    // update preview
    document.getElementById('lesson-link-preview').textContent = confirmLink;

    if (regs.length === 0) {
      showToast('Nessun iscritto per questo orario');
      return;
    }

    // compose message
    const names = regs.map(r => r.name || r.nome || '').filter(Boolean).join(', ');
    const msg = `Ciao a tutti! Vi ricordo la lezione di Karate ${slot.day} alle ${slot.time}.

Partecipanti: ${names}

Conferma presenza: ${confirmLink}`;

    // open WhatsApp with first participant who has a phone
    const first = regs.find(r => r.phone || r.telefono);
    if (first) {
      window.open(waLink(first.phone || first.telefono, msg), '_blank');
    } else {
      copyToClipboard(msg);
      showToast('Messaggio copiato (nessun telefono disponibile)');
    }
    showToast('Lezione creata!');
  }

  function copyLessonLink() {
    const text = document.getElementById('lesson-link-preview').textContent;
    if (text && text !== '—') {
      copyToClipboard(text);
    } else {
      showToast('Crea prima la lezione con il bottone WhatsApp');
    }
  }

  function copyInviteText() {
    copyToClipboard(document.getElementById('invite-text').textContent);
  }

  function shareInviteWhatsApp() {
    const text = document.getElementById('invite-text').textContent;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }

  /* ═══════════════════════════════════════════════════
     EXPORT CSV
  ═══════════════════════════════════════════════════ */
  function exportCSV() {
    const regs = _data.registrations || [];
    if (regs.length === 0) { showToast('Nessun dato da esportare'); return; }
    const header = ['Nome', 'Telefono', 'Orario', 'Data iscrizione'];
    const rows = regs.map(r => [
      r.name || r.nome || '',
      r.phone || r.telefono || '',
      r.slot || (r.day ? `${r.day} ${r.time}` : ''),
      r.createdAt ? new Date(r.createdAt).toLocaleString('it-IT') : ''
    ]);
    const csv = '\uFEFF' + [header, ...rows]
      .map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
      .join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `karate360-iscritti-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV esportato');
  }

  /* ═══════════════════════════════════════════════════
     NOTIFICATIONS
  ═══════════════════════════════════════════════════ */
  function checkNewRegistrations() {
    const count = (_data.registrations || []).length;
    if (_prevCount !== null && count > _prevCount) {
      const diff = count - _prevCount;
      const banner = document.getElementById('notif-banner');
      document.getElementById('notif-text').textContent =
        `${diff} nuova${diff > 1 ? 'e iscrizioni' : ' iscrizione'}!`;
      banner.style.display = 'flex';
      setTimeout(() => { banner.style.display = 'none'; }, 6000);

      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Karate 360', {
          body: `${diff} nuova${diff > 1 ? 'e iscrizioni' : ' iscrizione'} ricevuta!`,
          icon: 'icon-192.png'
        });
      }
    }
    _prevCount = count;
  }

  function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  /* ═══════════════════════════════════════════════════
     THEME
  ═══════════════════════════════════════════════════ */
  function initTheme() {
    const saved = localStorage.getItem('karate360-theme') || 'light';
    setTheme(saved, false);
  }

  function setTheme(mode, save = true) {
    document.documentElement.setAttribute('data-theme', mode);
    const icon = document.getElementById('themeIcon');
    icon.className = mode === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    if (save) localStorage.setItem('karate360-theme', mode);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    setTheme(current === 'dark' ? 'light' : 'dark');
  }

  document.getElementById('themeBtn').addEventListener('click', toggleTheme);

  /* ═══════════════════════════════════════════════════
     SERVICE WORKER
  ═══════════════════════════════════════════════════ */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  /* ═══════════════════════════════════════════════════
     AUTO REFRESH
  ═══════════════════════════════════════════════════ */
  setInterval(loadData, 30000);
  setInterval(() => {
    // notification poll
    fetch(API_URL, { cache: 'no-store' })
      .then(r => r.json())
      .then(d => {
        const c = (d.registrations || []).length;
        if (_prevCount !== null && c > _prevCount) {
          _data = d;
          checkNewRegistrations();
          render();
        }
      }).catch(() => {});
  }, 15000);

  /* ═══════════════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════════════ */
  initTheme();
  loadData();
  setTimeout(requestNotificationPermission, 3000);
  </script>

</body>
</html>
