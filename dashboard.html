<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0A0A0A" />
  <link rel="manifest" href="manifest-admin.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Fondamenti del Karate — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script src="config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0A0A0A;
      --card:   #1A1A1A;
      --card2:  #222222;
      --sep:    rgba(255,255,255,0.08);
      --sep2:   rgba(255,255,255,0.13);
      --sand:   #C8A87C;
      --sand-d: rgba(200,168,124,0.15);
      --sand-l: rgba(200,168,124,0.08);
      --green:  #4CAF6E;
      --yellow: #E8B84B;
      --gray:   #555555;
      --white:  #FFFFFF;
      --dim:    #AAAAAA;
      --dim2:   #666666;
      --r:      16px;
    }

    html { background: var(--bg); }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ── STICKY HEADER ── */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--sep);
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--white);
    }

    #header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hbtn {
      height: 44px;
      min-width: 44px;
      border-radius: 22px;
      border: 1px solid var(--sep2);
      background: var(--card);
      color: var(--dim);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      padding: 0 14px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }
    .hbtn:active { background: var(--card2); color: var(--sand); }
    .hbtn i { font-size: 15px; }

    /* ── NOTIFICATION BANNER ── */
    #notif-banner {
      display: none;
      background: var(--sand-d);
      border-bottom: 1px solid rgba(200,168,124,0.2);
      padding: 14px 20px;
      font-size: 15px;
      color: var(--sand);
      align-items: center;
      gap: 12px;
    }
    #notif-banner i { font-size: 18px; flex-shrink: 0; }
    #notif-banner-text { flex: 1; }
    #notif-close {
      background: none;
      border: none;
      color: var(--sand);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    #notif-enable-btn {
      background: var(--sand);
      color: #000;
      border: none;
      border-radius: 22px;
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── MAIN SCROLL ── */
    #main {
      padding: 0 0 60px;
    }

    /* ── SECTIONS ── */
    .section {
      padding: 28px 20px 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 16px;
    }

    /* ── BIG COUNTER ── */
    #big-counter {
      padding: 32px 20px 0;
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    #big-number {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -3px;
      color: var(--sand);
      line-height: 1;
    }

    #big-label {
      font-size: 22px;
      font-weight: 500;
      color: var(--dim);
      padding-bottom: 8px;
    }

    /* ── TOP SLOTS CARDS ── */
    #top-slots {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 20px 0;
    }

    .top-slot-card {
      background: var(--card);
      border: 1px solid var(--sep);
      border-radius: var(--r);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .top-slot-left { flex: 1; min-width: 0; }

    .top-slot-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .top-slot-count {
      font-size: 15px;
      color: var(--dim);
      margin-top: 3px;
    }

    .slot-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: var(--green); box-shadow: 0 0 8px rgba(76,175,110,0.5); }
    .dot-yellow { background: var(--yellow); box-shadow: 0 0 8px rgba(232,184,75,0.5); }
    .dot-gray   { background: var(--gray); }

    /* ── PROSSIMA LEZIONE ── */
    #next-lesson-card {
      background: var(--card);
      border: 1px solid var(--sep2);
      border-radius: var(--r);
      overflow: hidden;
    }

    #next-lesson-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--sep);
    }

    #next-lesson-slot {
      font-size: 24px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    #next-lesson-subtitle {
      font-size: 16px;
      color: var(--dim);
      margin-top: 4px;
    }

    #next-people-list {
      padding: 16px 20px;
    }

    .person-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--sep);
    }
    .person-row:last-child { border-bottom: none; }

    .person-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--sand-d);
      color: var(--sand);
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .person-info { flex: 1; min-width: 0; }

    .person-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
    }

    .person-phone {
      font-size: 15px;
      color: var(--sand);
      margin-top: 2px;
      text-decoration: none;
      display: block;
    }

    .confirmed-badge {
      font-size: 13px;
      color: var(--green);
      font-weight: 600;
      flex-shrink: 0;
    }

    #next-lesson-actions {
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── CONFIRMED SUMMARY ── */
    #confirmed-summary {
      background: rgba(76,175,110,0.1);
      border: 1px solid rgba(76,175,110,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 17px;
      color: var(--green);
      font-weight: 600;
      text-align: center;
    }

    /* ── BUTTONS ── */
    .btn-big {
      width: 100%;
      height: 60px;
      border-radius: 14px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn-big:active { transform: scale(0.97); opacity: 0.9; }

    .btn-sand {
      background: var(--sand);
      color: #000000;
    }

    .btn-outline {
      background: transparent;
      color: var(--sand);
      border: 1.5px solid var(--sand);
    }

    .btn-medium {
      height: 52px;
      border-radius: 12px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn-medium:active { transform: scale(0.97); opacity: 0.9; }

    .btn-small-text {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 0;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-small-text:active { opacity: 0.6; }

    /* ── TUTTI GLI ORARI ── */
    #all-slots-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slot-row {
      background: var(--card);
      border: 1px solid var(--sep);
      border-radius: var(--r);
      overflow: hidden;
    }

    .slot-row-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .slot-row-name {
      flex: 1;
      font-size: 19px;
      font-weight: 600;
      color: var(--white);
    }

    .slot-badge {
      background: var(--sand-d);
      color: var(--sand);
      font-size: 14px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .slot-chevron {
      color: var(--dim2);
      font-size: 14px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .slot-row.open .slot-chevron { transform: rotate(180deg); }

    .slot-row-body {
      display: none;
      border-top: 1px solid var(--sep);
      padding: 0 20px 16px;
    }
    .slot-row.open .slot-row-body { display: block; }

    .slot-person-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--sep);
      font-size: 16px;
    }
    .slot-person-item:last-of-type { border-bottom: none; }
    .slot-person-item i { color: var(--dim2); font-size: 14px; flex-shrink: 0; }

    .slot-send-btn {
      width: 100%;
      margin-top: 14px;
      height: 52px;
      background: var(--sand-d);
      color: var(--sand);
      border: 1.5px solid rgba(200,168,124,0.3);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .slot-send-btn:active { transform: scale(0.97); opacity: 0.9; }

    /* ── TUTTI GLI ISCRITTI ── */
    #all-people-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .person-card {
      background: var(--card);
      border: 1px solid var(--sep);
      border-radius: var(--r);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .person-card-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--sand-d);
      color: var(--sand);
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .person-card-info { flex: 1; min-width: 0; }

    .person-card-name {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .person-card-phone {
      font-size: 16px;
      color: var(--sand);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .person-card-slots {
      font-size: 14px;
      color: var(--dim);
      margin-top: 4px;
      line-height: 1.4;
    }

    .delete-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,59,48,0.12);
      border: 1px solid rgba(255,59,48,0.2);
      color: #FF3B30;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .delete-btn:active { background: rgba(255,59,48,0.25); }

    /* ── TESTO INVITO ── */
    #invite-box {
      background: var(--card);
      border: 1px solid var(--sep);
      border-radius: var(--r);
      padding: 20px;
    }

    #invite-text-preview {
      font-size: 17px;
      color: var(--dim);
      line-height: 1.6;
      margin-bottom: 20px;
      font-style: italic;
    }

    #invite-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.95);
      color: #000;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 99px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      z-index: 9999;
      transition: opacity 0.2s, transform 0.2s;
      max-width: calc(100vw - 40px);
      text-align: center;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── LOADING ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
    }

    #loading-screen .spin {
      width: 48px;
      height: 48px;
      border: 3px solid var(--sep2);
      border-top-color: var(--sand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #loading-screen p {
      font-size: 16px;
      color: var(--dim);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--dim2);
      font-size: 16px;
    }
    .empty-state i {
      font-size: 36px;
      display: block;
      margin-bottom: 12px;
      color: var(--dim2);
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--sep);
      margin: 28px 20px 0;
    }

    /* ── LAST UPDATE ── */
    #last-update {
      text-align: center;
      font-size: 13px;
      color: var(--dim2);
      padding: 20px 20px 0;
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 480px) {
      #big-number { font-size: 80px; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spin"></div>
  <p>Caricamento...</p>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- NOTIFICATION BANNER -->
<div id="notif-banner">
  <i class="fa-solid fa-bell"></i>
  <span id="notif-banner-text">Attiva le notifiche per sapere quando si iscrive qualcuno</span>
  <button id="notif-enable-btn" onclick="enableNotifications()">Attiva</button>
  <button id="notif-close" onclick="dismissNotifBanner()"><i class="fa-solid fa-xmark"></i></button>
</div>

<!-- STICKY HEADER -->
<div id="header">
  <div id="header-title">Fondamenti del Karate</div>
  <div id="header-actions">
    <button class="hbtn" onclick="exportCSV()" title="Esporta CSV">
      <i class="fa-solid fa-file-csv"></i>
    </button>
    <button class="hbtn" onclick="loadData(true)" id="refresh-btn" title="Aggiorna">
      <i class="fa-solid fa-rotate" id="refresh-icon"></i>
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main">

  <!-- 1. RIEPILOGO -->
  <div id="big-counter">
    <div id="big-number">—</div>
    <div id="big-label">iscritti</div>
  </div>
  <div id="top-slots"></div>

  <div class="divider"></div>

  <!-- 2. PROSSIMA LEZIONE -->
  <div class="section">
    <div class="section-title">Prossima lezione</div>
    <div id="next-lesson-card">
      <div id="next-lesson-header">
        <div id="next-lesson-slot">—</div>
        <div id="next-lesson-subtitle">—</div>
      </div>
      <div id="next-people-list"></div>
      <div id="next-lesson-actions">
        <div id="confirmed-summary" style="display:none"></div>
        <button class="btn-big btn-sand" id="wa-btn" onclick="sendWhatsApp()">
          <i class="fa-brands fa-whatsapp"></i>
          INVIA SU WHATSAPP
        </button>
        <button class="btn-small-text" onclick="copyLessonLink()">
          <i class="fa-solid fa-link"></i>
          Copia link conferma
        </button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 3. TUTTI GLI ORARI -->
  <div class="section">
    <div class="section-title">Tutti gli orari</div>
    <div id="all-slots-list"></div>
  </div>

  <div class="divider"></div>

  <!-- 4. TUTTI GLI ISCRITTI -->
  <div class="section">
    <div class="section-title">Tutti gli iscritti</div>
    <div id="all-people-list"></div>
  </div>

  <div class="divider"></div>

  <!-- 5. TESTO INVITO -->
  <div class="section">
    <div class="section-title">Testo invito</div>
    <div id="invite-box">
      <div id="invite-text-preview"></div>
      <div id="invite-actions">
        <button class="btn-big btn-sand" onclick="copyInviteText()">
          <i class="fa-solid fa-copy"></i>
          COPIA TESTO
        </button>
        <button class="btn-big btn-outline" onclick="sendInviteWhatsApp()">
          <i class="fa-brands fa-whatsapp"></i>
          INVIA SU WHATSAPP
        </button>
      </div>
    </div>
  </div>

  <div id="last-update"></div>

  <div style="height: 40px;"></div>

</div><!-- /main -->

<script>
  // ─────────────────────────────────────────────
  // SLOTS
  // ─────────────────────────────────────────────
  const SLOTS = [
    { day: 'Lunedì',    time: '18:00-19:00' },
    { day: 'Lunedì',    time: '19:00-20:00' },
    { day: 'Mercoledì', time: '18:00-19:00' },
    { day: 'Mercoledì', time: '19:00-20:00' },
    { day: 'Venerdì',   time: '18:00-19:00' },
    { day: 'Venerdì',   time: '19:00-20:00' },
    { day: 'Sabato',    time: '09:00-10:00' },
    { day: 'Sabato',    time: '10:00-11:00' },
    { day: 'Sabato',    time: '11:00-12:00' },
    { day: 'Domenica',  time: '09:00-10:00' },
    { day: 'Domenica',  time: '10:00-11:00' },
    { day: 'Domenica',  time: '11:00-12:00' },
  ];

  // ─────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────
  let _data = { registrations: [], lessons: [] };
  let _bestSlot = null;
  let _lastCount = null;
  let _notifDismissed = false;
  let _openSlots = new Set();

  // ─────────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────────
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function waLink(phone, msg) {
    const p = phone.replace(/\D/g, '');
    const num = p.startsWith('39') ? p : (p.startsWith('0') ? '39' + p.slice(1) : '39' + p);
    return `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - new Date(ts).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'adesso';
    if (m < 60) return `${m} min fa`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h} ore fa`;
    const d = Math.floor(h / 24);
    return `${d} giorni fa`;
  }

  function initials(name) {
    if (!name) return '?';
    return name.trim().split(' ').map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
  }

  function slotKey(s) {
    return `${s.day} ${s.time}`;
  }

  function slotLabel(s) {
    return `${s.day} ${s.time}`;
  }

  function formatSlotForMessage(s) {
    const startTime = s.time.split('-')[0];
    return `${s.day} alle ${startTime}`;
  }

  function showToast(msg, duration = 2400) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  async function copyToClipboard(text, msg) {
    try {
      await navigator.clipboard.writeText(text);
      showToast(msg || 'Copiato!');
    } catch {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast(msg || 'Copiato!'); } catch {}
      document.body.removeChild(ta);
    }
  }

  function getRegistrationLink() {
    const base = window.location.href.replace('dashboard.html', 'index.html');
    return base;
  }

  function getLessonConfirmLink(lessonId) {
    const base = window.location.href.replace('dashboard.html', 'index.html');
    return `${base}?confirm=${lessonId}`;
  }

  // ─────────────────────────────────────────────
  // DATA LOADING
  // ─────────────────────────────────────────────
  async function loadData(manual = false) {
    if (manual) {
      const icon = document.getElementById('refresh-icon');
      icon.style.animation = 'spin 0.8s linear infinite';
    }
    try {
      const res = await fetch(API_URL, {
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        cache: 'no-store'
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      _data = await res.json();
      if (!Array.isArray(_data.registrations)) _data.registrations = [];
      if (!Array.isArray(_data.lessons)) _data.lessons = [];
      render();
      checkNewRegistrations();
      document.getElementById('last-update').textContent =
        'Aggiornato: ' + new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    } catch (err) {
      if (manual) showToast('Errore di rete. Riprova.');
      console.error(err);
    } finally {
      if (manual) {
        setTimeout(() => {
          const icon = document.getElementById('refresh-icon');
          icon.style.animation = '';
        }, 400);
      }
    }
    document.getElementById('loading-screen').style.display = 'none';
  }

  async function putData() {
    await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(_data)
    });
  }

  function checkNewRegistrations() {
    const count = _data.registrations.length;
    if (_lastCount !== null && count > _lastCount) {
      const diff = count - _lastCount;
      const msg = diff === 1 ? 'Nuova iscrizione!' : `${diff} nuove iscrizioni!`;
      showToast(msg, 3500);
      if (Notification.permission === 'granted') {
        try {
          new Notification('Fondamenti del Karate', {
            body: msg,
            icon: 'icon-192.png'
          });
        } catch {}
      }
    }
    _lastCount = count;
  }

  // ─────────────────────────────────────────────
  // LESSON MANAGEMENT
  // ─────────────────────────────────────────────
  async function createLesson(slot) {
    const key = slotKey(slot);
    let lesson = _data.lessons.find(l => l.slotKey === key);
    if (lesson) return lesson;
    lesson = {
      id: 'lesson_' + Date.now(),
      slotKey: key,
      slotDay: slot.day,
      slotTime: slot.time,
      createdAt: new Date().toISOString(),
      confirmedIds: []
    };
    _data.lessons.push(lesson);
    await putData();
    return lesson;
  }

  function getLessonForSlot(slot) {
    return _data.lessons.find(l => l.slotKey === slotKey(slot)) || null;
  }

  // ─────────────────────────────────────────────
  // SLOT COUNTS
  // ─────────────────────────────────────────────
  function getSlotCounts() {
    const counts = {};
    SLOTS.forEach(s => { counts[slotKey(s)] = []; });
    _data.registrations.forEach(r => {
      if (Array.isArray(r.slots)) {
        r.slots.forEach(sk => {
          if (counts[sk] !== undefined) counts[sk].push(r);
        });
      }
    });
    return counts;
  }

  function getBestSlot(counts) {
    let best = null, bestCount = 0;
    SLOTS.forEach(s => {
      const c = (counts[slotKey(s)] || []).length;
      if (c > bestCount) { bestCount = c; best = s; }
    });
    return best;
  }

  // ─────────────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────────────
  function render() {
    const counts = getSlotCounts();
    _bestSlot = getBestSlot(counts);

    renderBigCounter();
    renderTopSlots(counts);
    renderNextLesson(counts);
    renderAllSlots(counts);
    renderAllPeople();
    renderInviteText();
  }

  function renderBigCounter() {
    document.getElementById('big-number').textContent = _data.registrations.length;
  }

  function renderTopSlots(counts) {
    const sorted = SLOTS
      .map(s => ({ slot: s, people: counts[slotKey(s)] || [] }))
      .sort((a, b) => b.people.length - a.people.length)
      .slice(0, 3);

    const container = document.getElementById('top-slots');
    if (sorted.every(x => x.people.length === 0)) {
      container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i>Nessun iscritto ancora</div>';
      return;
    }

    container.innerHTML = sorted.map(({ slot, people }) => {
      const n = people.length;
      let dotClass = 'dot-gray';
      if (n >= 5) dotClass = 'dot-green';
      else if (n >= 3) dotClass = 'dot-yellow';
      return `
        <div class="top-slot-card">
          <div class="top-slot-left">
            <div class="top-slot-name">${esc(slotLabel(slot))}</div>
            <div class="top-slot-count">${n} ${n === 1 ? 'persona' : 'persone'}</div>
          </div>
          <div class="slot-dot ${dotClass}"></div>
        </div>
      `;
    }).join('');
  }

  function renderNextLesson(counts) {
    if (!_bestSlot) {
      document.getElementById('next-lesson-slot').textContent = 'Nessuno slot disponibile';
      document.getElementById('next-lesson-subtitle').textContent = 'Aspetta le prime iscrizioni';
      document.getElementById('next-people-list').innerHTML = '';
      return;
    }

    const key = slotKey(_bestSlot);
    const people = counts[key] || [];
    const lesson = getLessonForSlot(_bestSlot);

    document.getElementById('next-lesson-slot').textContent = slotLabel(_bestSlot);
    document.getElementById('next-lesson-subtitle').textContent =
      `${people.length} ${people.length === 1 ? 'persona disponibile' : 'persone disponibili'}`;

    // People list
    const listEl = document.getElementById('next-people-list');
    if (people.length === 0) {
      listEl.innerHTML = '<div class="empty-state" style="padding:20px 0"><i class="fa-solid fa-users-slash" style="font-size:28px;margin-bottom:8px;display:block;color:var(--dim2)"></i>Nessuno per questo orario</div>';
    } else {
      listEl.innerHTML = people.map(p => {
        const confirmed = lesson && Array.isArray(lesson.confirmedIds) && lesson.confirmedIds.includes(p.id);
        return `
          <div class="person-row">
            <div class="person-avatar">${esc(initials(p.name))}</div>
            <div class="person-info">
              <div class="person-name">${esc(p.name)}</div>
              ${p.phone ? `<a class="person-phone" href="${esc(waLink(p.phone, 'Ciao ' + p.name + '!'))}" target="_blank"><i class="fa-brands fa-whatsapp"></i> ${esc(p.phone)}</a>` : '<span class="person-phone" style="color:var(--dim2)">Nessun numero</span>'}
            </div>
            ${confirmed ? '<div class="confirmed-badge"><i class="fa-solid fa-check-circle"></i> Confermato</div>' : ''}
          </div>
        `;
      }).join('');
    }

    // Confirmed summary
    const summaryEl = document.getElementById('confirmed-summary');
    if (lesson && Array.isArray(lesson.confirmedIds) && lesson.confirmedIds.length > 0) {
      summaryEl.style.display = 'block';
      summaryEl.textContent = `${lesson.confirmedIds.length} su ${people.length} hanno confermato`;
    } else {
      summaryEl.style.display = 'none';
    }
  }

  function renderAllSlots(counts) {
    const container = document.getElementById('all-slots-list');
    const sorted = SLOTS
      .map(s => ({ slot: s, people: counts[slotKey(s)] || [] }))
      .sort((a, b) => b.people.length - a.people.length);

    container.innerHTML = sorted.map(({ slot, people }) => {
      const key = slotKey(slot);
      const isOpen = _openSlots.has(key);
      const n = people.length;
      return `
        <div class="slot-row${isOpen ? ' open' : ''}" id="slot-row-${encodeURIComponent(key)}">
          <div class="slot-row-header" onclick="toggleSlot('${esc(key)}')">
            <div class="slot-row-name">${esc(slotLabel(slot))}</div>
            <div class="slot-badge">${n}</div>
            <i class="fa-solid fa-chevron-down slot-chevron"></i>
          </div>
          <div class="slot-row-body">
            ${n === 0
              ? '<div style="padding:12px 0;color:var(--dim2);font-size:15px">Nessuno per questo orario</div>'
              : people.map(p => `
                  <div class="slot-person-item">
                    <i class="fa-solid fa-user"></i>
                    <span style="flex:1;font-size:16px;color:var(--white)">${esc(p.name)}</span>
                    ${p.phone ? `<a href="${esc(waLink(p.phone, 'Ciao ' + p.name + '!'))}" style="color:var(--sand);font-size:15px" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>` : ''}
                  </div>
                `).join('')
            }
            <button class="slot-send-btn" onclick="sendSlotWhatsApp('${esc(key)}')">
              <i class="fa-brands fa-whatsapp"></i>
              Invia messaggio
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleSlot(key) {
    if (_openSlots.has(key)) _openSlots.delete(key);
    else _openSlots.add(key);
    const el = document.getElementById('slot-row-' + encodeURIComponent(key));
    if (el) el.classList.toggle('open');
  }

  function renderAllPeople() {
    const container = document.getElementById('all-people-list');
    const people = [..._data.registrations].sort((a, b) =>
      (a.name || '').localeCompare(b.name || '', 'it')
    );

    if (people.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-user-slash"></i>Nessun iscritto</div>';
      return;
    }

    container.innerHTML = people.map(p => {
      const slotsText = Array.isArray(p.slots) && p.slots.length > 0
        ? p.slots.join(', ')
        : 'Nessun orario';
      return `
        <div class="person-card">
          <div class="person-card-avatar">${esc(initials(p.name))}</div>
          <div class="person-card-info">
            <div class="person-card-name">${esc(p.name)}</div>
            ${p.phone
              ? `<a class="person-card-phone" href="${esc(waLink(p.phone, 'Ciao ' + p.name + '!'))}" target="_blank"><i class="fa-brands fa-whatsapp"></i>${esc(p.phone)}</a>`
              : '<span style="font-size:15px;color:var(--dim2)">Nessun numero</span>'
            }
            <div class="person-card-slots">${esc(slotsText)}</div>
          </div>
          <button class="delete-btn" onclick="deleteRegistration('${esc(p.id)}', '${esc(p.name)}')">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      `;
    }).join('');
  }

  function renderInviteText() {
    const link = getRegistrationLink();
    const text = `Ciao! Ti va di partecipare alle lezioni di Fondamenti del Karate? Scegli quando sei disponibile: ${link} — Salvatore`;
    document.getElementById('invite-text-preview').textContent = `"${text}"`;
    document.getElementById('invite-box').dataset.inviteText = text;
  }

  // ─────────────────────────────────────────────
  // ACTIONS
  // ─────────────────────────────────────────────
  async function sendWhatsApp() {
    if (!_bestSlot) { showToast('Nessuno slot disponibile'); return; }

    const btn = document.getElementById('wa-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Preparazione...';

    try {
      const lesson = await createLesson(_bestSlot);
      const counts = getSlotCounts();
      const key = slotKey(_bestSlot);
      const people = counts[key] || [];
      const n = people.length;
      const link = getLessonConfirmLink(lesson.id);
      const msg = `Ciao a tutti! Lezione di Fondamenti del Karate ${formatSlotForMessage(_bestSlot)}. Siamo in ${n}! Conferma qui: ${link} — Salvatore`;
      window.open(waLink('', msg).replace('wa.me//', 'api.whatsapp.com/send?text=').replace('?text=', ''), '_blank');
      // fallback: direct wa.me without number for group share
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
      showToast('Messaggio pronto!');
      await loadData();
    } catch(e) {
      showToast('Errore. Riprova.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-brands fa-whatsapp"></i> INVIA SU WHATSAPP';
    }
  }

  async function copyLessonLink() {
    if (!_bestSlot) { showToast('Nessuno slot disponibile'); return; }
    const lesson = await createLesson(_bestSlot);
    const link = getLessonConfirmLink(lesson.id);
    copyToClipboard(link, 'Link copiato!');
  }

  async function sendSlotWhatsApp(key) {
    const slot = SLOTS.find(s => slotKey(s) === key);
    if (!slot) return;
    const lesson = await createLesson(slot);
    const counts = getSlotCounts();
    const people = counts[key] || [];
    const n = people.length;
    const link = getLessonConfirmLink(lesson.id);
    const msg = `Ciao a tutti! Lezione di Fondamenti del Karate ${formatSlotForMessage(slot)}. Siamo in ${n}! Conferma qui: ${link} — Salvatore`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    showToast('Messaggio pronto!');
    await loadData();
  }

  async function deleteRegistration(id, name) {
    if (!confirm(`Eliminare ${name}?`)) return;
    _data.registrations = _data.registrations.filter(r => r.id !== id);
    await putData();
    showToast(`${name} eliminato`);
    await loadData();
  }

  function copyInviteText() {
    const text = document.getElementById('invite-box').dataset.inviteText;
    copyToClipboard(text, 'Testo copiato!');
  }

  function sendInviteWhatsApp() {
    const text = document.getElementById('invite-box').dataset.inviteText;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }

  // ─────────────────────────────────────────────
  // EXPORT CSV
  // ─────────────────────────────────────────────
  function exportCSV() {
    const rows = [['Nome', 'Telefono', 'Orari', 'Iscritto il']];
    _data.registrations.forEach(r => {
      rows.push([
        r.name || '',
        r.phone || '',
        Array.isArray(r.slots) ? r.slots.join(' | ') : '',
        r.createdAt ? new Date(r.createdAt).toLocaleString('it-IT') : ''
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `karate_iscritti_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV esportato!');
  }

  // ─────────────────────────────────────────────
  // NOTIFICATIONS
  // ─────────────────────────────────────────────
  function showNotifBanner() {
    if (_notifDismissed) return;
    if (Notification.permission === 'granted') return;
    if (Notification.permission === 'denied') return;
    if (localStorage.getItem('notif_dismissed')) return;
    const banner = document.getElementById('notif-banner');
    banner.style.display = 'flex';
  }

  function dismissNotifBanner() {
    document.getElementById('notif-banner').style.display = 'none';
    _notifDismissed = true;
    localStorage.setItem('notif_dismissed', '1');
  }

  async function enableNotifications() {
    try {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        dismissNotifBanner();
        showToast('Notifiche attivate!');
      } else {
        dismissNotifBanner();
        showToast('Notifiche non attivate');
      }
    } catch {
      dismissNotifBanner();
    }
  }

  // ─────────────────────────────────────────────
  // SERVICE WORKER
  // ─────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ─────────────────────────────────────────────
  // AUTO REFRESH
  // ─────────────────────────────────────────────
  setInterval(() => loadData(false), 30000);
  setInterval(() => {
    // silent poll for new registrations
    fetch(API_URL, {
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      cache: 'no-store'
    })
    .then(r => r.json())
    .then(d => {
      if (!Array.isArray(d.registrations)) return;
      const count = d.registrations.length;
      if (_lastCount !== null && count > _lastCount) {
        const diff = count - _lastCount;
        const msg = diff === 1 ? 'Nuova iscrizione!' : `${diff} nuove iscrizioni!`;
        showToast(msg, 3500);
        if (Notification.permission === 'granted') {
          try { new Notification('Fondamenti del Karate', { body: msg, icon: 'icon-192.png' }); } catch {}
        }
        _data = d;
        if (!Array.isArray(_data.lessons)) _data.lessons = [];
        render();
      }
      _lastCount = count;
    })
    .catch(() => {});
  }, 15000);

  // ─────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadData(false);
    setTimeout(showNotifBanner, 3000);
  });
</script>

</body>
</html>
